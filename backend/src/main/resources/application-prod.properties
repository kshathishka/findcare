# Production Profile Configuration

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Database Configuration - PostgreSQL on Render
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration - Optimized for production
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:30000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.auto-commit=true

# JPA/Hibernate Configuration - Validate schema only in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# Logging Configuration - Minimal logging in production
logging.level.root=WARN
logging.level.com.findcare=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{requestId}] %logger{35} - %msg%n

# JWT Configuration
app.jwt.secret=${JWT_SECRET:JWTSecretKeyForFindCareApplicationSecureAndStrong2024ExtraSecurePadding!!}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration - Set your Render frontend URL here
# Example: https://myapp-frontend.onrender.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://findcare-frontend-k3qb.vercel.app}

# Rate Limiting
app.auth.rate-limit.max-attempts=${AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
app.auth.rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

# Application Configuration
spring.application.name=findcare-backend
