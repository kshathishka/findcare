spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server Configuration
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=${SERVER_CONTEXT_PATH:/}

# JPA Configuration
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=${JWT_SECRET:JWTSecretKeyForFindCareApplicationSecureAndStrong2024ExtraSecurePadding!!}
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
# Format: comma-separated list of allowed origins
# Examples: http://localhost:5173,https://app.example.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Rate Limiting Configuration
app.auth.rate-limit.max-attempts=${AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
app.auth.rate-limit.window-seconds=${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

# Logging Configuration
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.findcare=${LOG_LEVEL_APP:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{requestId}] [%thread] %logger{36} - %msg%n

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/findcare
spring.datasource.username=root
spring.datasource.password=2006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect